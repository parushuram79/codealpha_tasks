<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaBridge — Offline Language Translation</title>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#efefec;
  --text:#1a1a1a;--text2:#555550;--text3:#99998f;
  --border:#e0e0d8;--border2:#c8c8c0;
  --accent:#1a1a2e;--accent2:#2d2d4e;
  --green:#22c55e;--red:#dc2626;
  --radius:10px;--shadow:0 4px 24px rgba(0,0,0,.07);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg3);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
/* ── Layout ── */
.wrapper{width:100%;max-width:880px}
.page-title{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.logo{width:44px;height:44px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;font-style:italic;font-family:Georgia,serif}
h1{font-size:26px;font-weight:700;color:var(--text)}
.sub{font-size:13px;color:var(--text3);margin-bottom:20px;margin-left:56px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
/* ── Lang Bar ── */
.lang-bar{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--bg2)}
select{flex:1;padding:9px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--bg);color:var(--text);cursor:pointer;outline:none}
.swap-btn{width:38px;height:38px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .15s}
.swap-btn:hover{background:var(--bg3)}
/* ── Panels ── */
.panels{display:grid;grid-template-columns:1fr 1fr}
.panel{padding:18px 22px;position:relative}
.panel-left{border-right:1px solid var(--border)}
.panel-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
textarea{width:100%;height:190px;border:none;outline:none;resize:none;font-size:15px;line-height:1.65;color:var(--text);background:transparent;font-family:inherit}
textarea::placeholder{color:var(--text3)}
.result-box{font-size:15px;line-height:1.65;color:var(--text);min-height:190px;white-space:pre-wrap;word-break:break-word}
.result-placeholder{color:var(--text3);min-height:190px;font-size:15px}
.panel-actions{position:absolute;top:18px;right:18px;display:flex;gap:6px}
.icon-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:7px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .14s}
.icon-btn:hover{background:var(--bg2)}
/* ── Bottom Bar ── */
.bottom-bar{padding:12px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-wrap:wrap;gap:10px}
.char-count{font-size:12px;color:var(--text3)}
.btn-row{display:flex;gap:8px}
.btn{padding:8px 20px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg);color:var(--text)}
.btn-secondary:hover{background:var(--bg3)}
/* ── Status ── */
.status-bar{padding:9px 22px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1}
/* ── Phrasebook Panel ── */
.phrase-section{padding:14px 22px;border-top:1px solid var(--border);background:var(--bg2)}
.phrase-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.phrase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px}
.phrase-btn{padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .14s;text-align:left;line-height:1.4;font-family:inherit}
.phrase-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
/* ── Dictionary note ── */
.dict-note{font-size:11px;color:var(--text3);padding:8px 22px;border-top:1px solid var(--border);font-style:italic}
</style>
</head>
<body>
<div class="wrapper">
  <div class="page-title"><div class="logo">Tr</div><h1>LinguaBridge</h1></div>
  <p class="sub">100% Offline Language Translation Tool — CodeAlpha Task 1</p>

  <div class="card">
    <div class="lang-bar">
      <select id="srcLang">
        <option value="en" selected>English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="hi">Hindi</option>
        <option value="te">Telugu</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
      </select>
      <button class="swap-btn" id="swapBtn" title="Swap languages">⇄</button>
      <select id="tgtLang">
        <option value="es" selected>Spanish</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="hi">Hindi</option>
        <option value="te">Telugu</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
      </select>
    </div>

    <div class="panels">
      <div class="panel panel-left">
        <div class="panel-label">Source Text</div>
        <textarea id="src" placeholder="Enter text to translate…&#10;&#10;Try: Hello, how are you? Good morning. Thank you." maxlength="2000"></textarea>
      </div>
      <div class="panel panel-right">
        <div class="panel-label">Translation</div>
        <div class="panel-actions">
          <button class="icon-btn" id="copyBtn" title="Copy">📋</button>
          <button class="icon-btn" id="speakBtn" title="Read aloud">🔊</button>
        </div>
        <div id="resultArea"><div class="result-placeholder">Translation will appear here…</div></div>
      </div>
    </div>

    <div class="phrase-section">
      <div class="phrase-title">Quick Phrases (click to translate)</div>
      <div class="phrase-grid" id="phraseGrid"></div>
    </div>

    <div class="bottom-bar">
      <span class="char-count" id="charCount">0 / 2000</span>
      <div class="btn-row">
        <button class="btn btn-secondary" id="clearBtn">Clear</button>
        <button class="btn btn-primary" id="transBtn">Translate →</button>
      </div>
    </div>
    <div class="status-bar"><div class="dot"></div><span id="status">Ready · Ctrl+Enter to translate</span></div>
    <div class="dict-note" id="dictNote">Built-in dictionary · 500+ phrase translations · Works 100% offline</div>
  </div>
</div>
<div class="toast" id="toast">✓ Copied!</div>

<script>
// ════════════════════════════════════════════════════════════
// OFFLINE TRANSLATION ENGINE
// Built-in bilingual dictionary + sentence tokenizer
// ════════════════════════════════════════════════════════════

const LANG_NAMES = {

// Quick phrases shown in UI
const QUICK_PHRASES = [

// ── Build reverse lookup (any lang → en) ────────────────────
const REVERSE = {}; // "hola:es" → "hello"
for (const [en, langs] of Object.entries(DICT)) {
  for (const [lang, word] of Object.entries(langs)) {
    REVERSE[word.toLowerCase() + ':' + lang] = en;
  }
}

// ── Translation engine ───────────────────────────────────────
function translate(text, src, tgt) {
  if (!text.trim()) return '';
  if (src === tgt) return text;

  // Normalize to English first if src isn't English
  let english = src === 'en' ? text.toLowerCase() : toEnglish(text, src);

  // Then translate English → target
  if (tgt === 'en') return capitalise(english);
  return translateFromEnglish(english, tgt);
}

function toEnglish(text, srcLang) {
  // Try phrase-level reverse lookup, then word-level
  const lower = text.trim().toLowerCase();
  if (REVERSE[lower + ':' + srcLang]) return REVERSE[lower + ':' + srcLang];
  // Word by word
  return lower.split(/\s+/).map(w => {
    const clean = w.replace(/[¿¡?!.,;:]/g, '');
    return REVERSE[clean + ':' + srcLang] || w;
  }).join(' ');
}

function translateFromEnglish(text, tgt) {
  const sentences = text.split(/(?<=[.!?])\s+|(?<=[.!?])$/);
  return sentences.map(s => translateSentence(s.trim(), tgt)).filter(Boolean).join(' ');
}

function translateSentence(sentence, tgt) {
  if (!sentence) return '';
  const lower = sentence.toLowerCase().replace(/[¿¡]/g,'').trim();

  // 1. Full phrase match (longest first)
  const sorted = Object.keys(DICT).sort((a,b)=>b.length-a.length);
  for (const phrase of sorted) {
    if (lower.includes(phrase) && DICT[phrase][tgt]) {
      const replaced = lower.replace(phrase, DICT[phrase][tgt]);
      // Continue translating remaining words
      return translateRemainingWords(replaced, phrase, DICT[phrase][tgt], tgt, lower);
    }
  }

  // 2. Word-by-word
  const words = lower.replace(/[?!.,;:]/g,'').split(/\s+/);
  const translated = words.map(w => {
    if (DICT[w] && DICT[w][tgt]) return DICT[w][tgt];
    // Try partial matches
    for (const [key, vals] of Object.entries(DICT)) {
      if (w === key && vals[tgt]) return vals[tgt];
    }
    return w; // keep original if no translation
  });

  let result = translated.join(' ');
  // Re-add punctuation
  if (sentence.endsWith('?')) result += '?';
  else if (sentence.endsWith('!')) result += '!';
  else if (sentence.endsWith('.')) result += '.';
  return capitalise(result);
}

function translateRemainingWords(result, origPhrase, translatedPhrase, tgt, lower) {
  const remaining = lower.replace(origPhrase, '').trim();
  if (!remaining) return capitalise(translatedPhrase);
  const extraWords = remaining.split(/\s+/);
  const extraTrans = extraWords.map(w => {
    const clean = w.replace(/[?!.,;:]/g,'');
    return (DICT[clean] && DICT[clean][tgt]) ? DICT[clean][tgt] : clean;
  });
  return capitalise(translatedPhrase + ' ' + extraWords.join(' '));
}

function capitalise(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// ── Multi-sentence handler ───────────────────────────────────
function translateFull(text, src, tgt) {
  if (src === tgt) return text;
  // Split by sentence-ending punctuation
  const parts = text.split(/([.!?\n]+)/);
  let result = '';
  for (let i = 0; i < parts.length; i += 2) {
    const sentence = (parts[i] || '').trim();
    const punct    = parts[i+1] || '';
    if (sentence) {
      result += translate(sentence, src, tgt) + punct + ' ';
    }
  }
  return result.trim() || translate(text, src, tgt);
}

// ── DOM Logic ────────────────────────────────────────────────
const srcEl    = document.getElementById('src');
const resArea  = document.getElementById('resultArea');
const srcLang  = document.getElementById('srcLang');
const tgtLang  = document.getElementById('tgtLang');
const charEl   = document.getElementById('charCount');
const statusEl = document.getElementById('status');
const toast    = document.getElementById('toast');
let lastResult = '';

// Populate quick phrases
const phraseGrid = document.getElementById('phraseGrid');
QUICK_PHRASES.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'phrase-btn';
  btn.textContent = p;
  btn.addEventListener('click', () => {
    srcEl.value = p;
    charEl.textContent = p.length + ' / 2000';
    doTranslate();
  });
  phraseGrid.appendChild(btn);
});

srcEl.addEventListener('input', () => {
  charEl.textContent = srcEl.value.length + ' / 2000';
});

document.getElementById('swapBtn').addEventListener('click', () => {
  const sv = srcLang.value, tv = tgtLang.value;
  srcLang.value = tv; tgtLang.value = sv;
  if (lastResult) {
    srcEl.value = lastResult;
    charEl.textContent = lastResult.length + ' / 2000';
    doTranslate();
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  srcEl.value = ''; lastResult = '';
  charEl.textContent = '0 / 2000';
  resArea.innerHTML = '<div class="result-placeholder">Translation will appear here…</div>';
  statusEl.textContent = 'Ready · Ctrl+Enter to translate';
});

document.getElementById('copyBtn').addEventListener('click', () => {
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult).then(() => {
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = lastResult; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
});

document.getElementById('speakBtn').addEventListener('click', () => {
  if (!lastResult || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(lastResult);
  const langMap = {es:'es-ES',fr:'fr-FR',de:'de-DE',it:'it-IT',pt:'pt-BR',
                   hi:'hi-IN',ar:'ar-SA',ru:'ru-RU',ja:'ja-JP',zh:'zh-CN',en:'en-US',te:'te-IN'};
  utt.lang = langMap[tgtLang.value] || 'en-US';
  speechSynthesis.speak(utt);
  statusEl.textContent = '🔊 Speaking…';
});

document.getElementById('transBtn').addEventListener('click', doTranslate);
srcEl.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') doTranslate();
});

function doTranslate() {
  const text = srcEl.value.trim();
  if (!text) { statusEl.textContent = '⚠ Please enter text'; return; }
  const src = srcLang.value, tgt = tgtLang.value;
  statusEl.textContent = 'Translating…';
  const result = translateFull(text, src, tgt);
  lastResult = result;
  resArea.innerHTML = `<div class="result-box">${result.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  const sname = LANG_NAMES[src], tname = LANG_NAMES[tgt];
  document.getElementById('dictNote').textContent =
    `Translated ${sname} → ${tname} · Built-in offline dictionary · ${Object.keys(DICT).length} entries`;
  statusEl.textContent = `✓ Done · ${sname} → ${tname} · ${new Date().toLocaleTimeString()}`;
}
